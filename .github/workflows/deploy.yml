name: Deploy to Cloudflare

on:
  push:
    branches: [main]

jobs:
  deploy-workers:
    runs-on: ubuntu-latest
    name: Deploy Workers API
    outputs:
      worker-url: ${{ steps.deploy.outputs.url }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 9 }
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - name: Inject bindings
        working-directory: workers
        run: |
          sed -i "s/D1_DATABASE_ID/${{ secrets.D1_DATABASE_ID }}/" wrangler.toml
          sed -i "s/KV_NAMESPACE_ID/${{ secrets.KV_NAMESPACE_ID }}/" wrangler.toml
      - name: Set JWT secret
        working-directory: workers
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: echo "${{ secrets.JWT_SECRET }}" | npx wrangler secret put JWT_SECRET
      - name: Deploy Worker
        id: deploy
        working-directory: workers
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          DEPLOY_OUT=$(npx wrangler deploy 2>&1)
          echo "$DEPLOY_OUT"
          WORKER_URL=$(echo "$DEPLOY_OUT" | grep -oP 'https://[^\s]+\.workers\.dev')
          echo "url=$WORKER_URL" >> $GITHUB_OUTPUT

  deploy-frontend:
    runs-on: ubuntu-latest
    name: Deploy Frontend to Pages
    needs: deploy-workers
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 9 }
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - name: Build frontend
        working-directory: frontend
        env:
          VITE_API_URL: /api
        run: |
          pnpm build
          sed -i 's/crossorigin//g' dist/index.html

      - name: Ensure SPA fallback
        working-directory: frontend
        run: |
          echo '/*    /index.html   200' > dist/_redirects
      - name: Deploy to Pages
        working-directory: frontend
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          # Build _worker.js that serves static assets AND proxies /api/* to Worker
          cat > dist/_worker.js << 'WORKER_EOF'
          const API_TARGET = "${{ needs.deploy-workers.outputs.worker-url }}";
          export default {
            async fetch(request, env, ctx) {
              const url = new URL(request.url);
              if (url.pathname.startsWith("/api/")) {
                const target = new URL(url.pathname + url.search, API_TARGET);
                return fetch(target.toString(), request);
              }
              // Static fallback to SPA index.html
              try {
                const asset = await env.ASSETS.fetch(request);
                if (asset.status !== 404) return asset;
              } catch {}
              return env.ASSETS.fetch(new URL("/index.html", request.url));
            }
          }
          WORKER_EOF
          npx wrangler pages project create novel-reader --production-branch=main 2>/dev/null || true
          npx wrangler pages deploy dist --project-name=novel-reader --branch=main
