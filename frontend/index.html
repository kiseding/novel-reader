<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#f2f2f4" />
    <meta name="description" content="多源在线小说阅读平台" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png" />
    <link rel="apple-touch-icon" sizes="192x192" href="/icon-192.png" />
    <link rel="manifest" href="/manifest.json" />
    <title>小说阅读</title>
    <script>
      (function () {
        try {
          var t = localStorage.getItem("lx_theme") || "auto";
          var d = document.documentElement;
          d.classList.remove("light", "dark");
          var dark = t === "dark" || (t === "auto" && window.matchMedia("(prefers-color-scheme: dark)").matches);
          d.classList.add(dark ? "dark" : "light");
          var bg = dark ? "#0d1b2a" : "#f2f2f4";
          d.style.background = bg;
          d.style.color = dark ? "#e2e8f0" : "#1c1c1e";
          var m = document.querySelector('meta[name="theme-color"]');
          if (m) m.setAttribute("content", bg);
        } catch (e) {}
      })();
    </script>
    <style>
      html, body { background: var(--bg); color: var(--t); }
      body { font-family: PingFang SC, Microsoft YaHei, sans-serif; margin: 0; min-height: 100vh; }
    </style>
  </head>
  <body>
    <div id="root"><div style="display:flex;align-items:center;justify-content:center;min-height:100vh;color:var(--t2)">加载中...</div></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
